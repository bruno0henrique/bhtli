<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ff4500" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#070709" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="url(#gradient)" stroke-width="8" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="8" fill="#ff4500"/>
</svg>
